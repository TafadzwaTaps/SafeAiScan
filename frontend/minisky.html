<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SafeAIScan Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body {
    background: #0b0f17;
    color: #e6edf3;
    font-family: Inter, sans-serif;
}

/* PANELS */
.panel {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 14px;
    backdrop-filter: blur(10px);
}

/* TIMELINE */
.timeline {
    max-height: 420px;
    overflow-y: auto;
    font-size: 12px;
}
.timeline-item {
    background: #0b1220;
    border-left: 2px solid #6366f1;
    padding: 6px;
    margin-bottom: 6px;
    border-radius: 6px;
}

/* VULN CARD */
.vuln {
    background: #0f172a;
    border: 1px solid #1f2937;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: 0.2s;
}
.vuln:hover {
    transform: scale(1.02);
    border-color: #6366f1;
    box-shadow: 0 0 10px rgba(99,102,241,0.3);
}

/* SIDE PANEL */
.side {
    position: fixed;
    right: -420px;
    top: 0;
    width: 420px;
    height: 100%;
    background: #0b1220;
    border-left: 1px solid #1f2937;
    transition: 0.3s;
    padding: 16px;
    z-index: 9999;
}
.side.open { right: 0; }

/* HEATMAP */
.heatmap {
    display: grid;
    grid-template-columns: repeat(10,1fr);
    gap: 4px;
}
.heat-cell {
    height: 10px;
    border-radius: 3px;
}
.high { background: #ef4444; }
.medium { background: #f59e0b; }
.low { background: #22c55e; }
.critical { background: #b91c1c; }

button:active { transform: scale(0.97); }
</style>
</head>

<body>

<!-- 🔥 TOP DASHBOARD -->
<div class="container-fluid mb-3">
  <div class="row g-3">

    <div class="col-md-3"><div class="panel text-center">
      <h6>Total Issues</h6><h3 id="totalIssues">0</h3>
    </div></div>

    <div class="col-md-3"><div class="panel text-center">
      <h6>Critical</h6><h3 class="text-danger" id="criticalCount">0</h3>
    </div></div>

    <div class="col-md-3"><div class="panel text-center">
      <h6>Risk Score</h6><h3 id="riskScore">0</h3>
    </div></div>

    <div class="col-md-3"><div class="panel text-center">
      <h6>Status</h6><h6 class="text-success">Secure</h6>
    </div></div>

  </div>
</div>

<div class="container-fluid">
<div class="row g-3">

<!-- LEFT -->
<div class="col-md-3 panel">
    <h6>🔥 Live Timeline</h6>
    <div id="timeline" class="timeline"></div>

    <hr/>

    <h6>🌐 Repo Scan</h6>
    <input id="repoUrl" class="form-control form-control-sm" placeholder="GitHub repo URL"/>
    <button class="btn btn-primary btn-sm w-100 mt-2" onclick="scanRepo()">Scan Repo</button>

    <hr/>

    <h6>🧠 CVE Lookup</h6>
    <input id="cveInput" class="form-control form-control-sm"/>
    <button class="btn btn-warning btn-sm w-100 mt-2" onclick="fetchCVE()">Fetch CVEs</button>

    <div id="cvePanel" class="mt-2 small"></div>

    <h6 class="mt-3">📁 Repo Files</h6>
    <div id="fileTree" class="small"></div>

    <button class="btn btn-outline-light w-100 mt-2" onclick="exportPDF()">Export PDF</button>
</div>

<!-- CENTER -->
<div class="col-md-6 panel">

    <h5>SafeAIScan Engine</h5>

    <!-- PROGRESS -->
    <div id="scanProgressText" class="small mb-1"></div>
    <div class="progress mb-2">
      <div id="scanProgressBar" class="progress-bar"></div>
    </div>

    <textarea id="code" class="form-control mt-3"
                rows="6"
                placeholder="eval("print('hello')")"></textarea>

    <button class="btn btn-success w-100 mt-2" onclick="runScan()">Run Scan</button>

    <hr/>

    <div id="results"></div>

</div>

<!-- RIGHT -->
<div class="col-md-3 panel">
    <h6>📊 System</h6>
    <div class="text-success">● AI Scanner Online</div>

    <h6>📡 Heatmap</h6>
    <div id="heatmap" class="heatmap"></div>

    <h6 class="mt-3">📊 Severity</h6>
    <div class="progress">
      <div id="barCritical" class="progress-bar bg-danger"></div>
      <div id="barHigh" class="progress-bar bg-warning"></div>
      <div id="barLow" class="progress-bar bg-success"></div>
    </div>
    <div class="panel mt-3">
        
        <h6>🧠 AI Explain</h6>
        <div id="aiChat" style="max-height:200px;overflow:auto;"></div>
        
        <input id="aiInput" class="form-control mt-2" placeholder="Ask about this vulnerability..."/>
        <button class="btn btn-sm btn-primary mt-2 w-100" onclick="askAI()">Ask AI</button>
    </div>

    <div class="panel mt-3">
        <h6>👥 Team</h6>
        <ul id="teamList"></ul>
    </div>
</div>

</div>
</div>

<!-- SIDE PANEL -->
<div id="side" class="side">
    <h5 id="title"></h5>
    <div id="desc"></div>
    <button class="btn btn-danger w-100 mt-3" onclick="closeSide()">Close</button>
</div>

<script src="api.js"></script>
<script src="app.js"></script>

<script>
let findings = [];

function log(msg){
    const el = document.getElementById("timeline");
    if(!el) return;
    const d = document.createElement("div");
    d.className="timeline-item";
    d.innerText=msg;
    el.prepend(d);
}

async function runScan(){
    log("Scanning...");
    startLiveProgress();

    try{
        const data = await analyzeCode(document.getElementById("code").value);

        console.log("🔥 SCAN RESULT:", data);

        findings = data.findings || [];

        // ✅ NEW: store AI result globally
        window.aiResult = data.ai || null;

        // ✅ FALLBACK: if no findings but AI exists
        if(findings.length === 0 && window.aiResult){
            findings = [{
                title: "AI Detected Issues",
                description: window.aiResult.explanation || "AI found potential issues",
                severity: "HIGH",
                fix: (window.aiResult.fixes || []).join("\n") || "Review code manually"
            }];
        }

        render();
        renderAI(); // 👈 NEW
        stopLiveProgress();

        log("Scan complete");

    }catch(e){
        stopLiveProgress();
        log("Error: "+e.message);
    }
}

function render(){
    const box = document.getElementById("results");
    box.innerHTML="";

    findings.forEach(v=>{
        const div=document.createElement("div");
        div.className="vuln";

        div.innerHTML=`
        <div class="d-flex justify-content-between">
            <div>
                <b>${v.match || v.title}</b>
                <div class="text-muted small">
                    ${(v.description || "").substring(0,120)}...
                    </div>
            </div>
            <span class="badge bg-danger">${v.severity||"HIGH"}</span>
        </div>`;

        div.onclick=()=>openSide(v);
        box.appendChild(div);
    });

    updateSummary();
    updateBars();
    renderHeatmap();
}

function renderAI(){
    const aiBox = document.getElementById("aiChat");
    if(!aiBox) return;

    aiBox.innerHTML = "";

    if(!window.aiResult){
        aiBox.innerHTML = "<div class='text-muted'>No AI response</div>";
        return;
    }

    const exp = window.aiResult.explanation || "No explanation";
    const fixes = window.aiResult.fixes || [];

    aiBox.innerHTML = `
        <div class="mb-2"><b>Explanation:</b></div>
        <div class="small mb-3">${exp}</div>

        <div><b>Fixes:</b></div>
        <ul class="small">
            ${fixes.map(f => `<li>${f}</li>`).join("")}
        </ul>
    `;
}

function updateSummary(){
    const total=findings.length;
    const critical=findings.length;

    document.getElementById("totalIssues").innerText=total;
    document.getElementById("criticalCount").innerText=critical;
    document.getElementById("riskScore").innerText=total*20;
}

function updateBars(){
    const total=findings.length||1;
    document.getElementById("barCritical").style.width=(findings.length/total*100)+"%";
}

function renderHeatmap(){
    const map=document.getElementById("heatmap");
    map.innerHTML="";
    findings.forEach(()=>{
        const c=document.createElement("div");
        c.className="heat-cell high";
        map.appendChild(c);
    });
}

function openSide(v){
    document.getElementById("side").classList.add("open");
    document.getElementById("title").innerText=v.match||v.title;

    document.getElementById("desc").innerHTML=`
    <div class="alert alert-warning">High Risk</div>
    <p>${v.description||"Potential vulnerability detected."}</p>
    <pre>${v.fix||"Sanitize inputs / avoid unsafe execution."}</pre>`;
}

function closeSide(){
    document.getElementById("side").classList.remove("open");
}

window.renderMinisky = function(data){
    findings = data.findings || [];
    render();
};

</script>

</body>
</html>
