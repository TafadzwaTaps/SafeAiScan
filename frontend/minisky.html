<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SafeAIScan Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body {
    background: #0b0f17;
    color: #e6edf3;
    font-family: Inter, sans-serif;
}

/* PANELS */
.panel {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 14px;
    backdrop-filter: blur(10px);
}

/* TIMELINE */
.timeline {
    max-height: 420px;
    overflow-y: auto;
    font-size: 12px;
}
.timeline-item {
    background: #0b1220;
    border-left: 2px solid #6366f1;
    padding: 6px;
    margin-bottom: 6px;
    border-radius: 6px;
}

/* VULN CARD */
.vuln {
    background: #0f172a;
    border: 1px solid #1f2937;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: 0.2s;
}
.vuln:hover {
    transform: scale(1.02);
    border-color: #6366f1;
    box-shadow: 0 0 10px rgba(99,102,241,0.3);
}

/* SIDE PANEL */
.side {
    position: fixed;
    right: -420px;
    top: 0;
    width: 420px;
    height: 100%;
    background: #0b1220;
    border-left: 1px solid #1f2937;
    transition: 0.3s;
    padding: 16px;
    z-index: 9999;
}
.side.open { right: 0; }

/* HEATMAP */
.heatmap {
    display: grid;
    grid-template-columns: repeat(10,1fr);
    gap: 4px;
}
.heat-cell {
    height: 10px;
    border-radius: 3px;
}
.high { background: #ef4444; }
.medium { background: #f59e0b; }
.low { background: #22c55e; }
.critical { background: #b91c1c; }

button:active { transform: scale(0.97); }
</style>
</head>

<body>

<!-- 🔥 TOP DASHBOARD -->
<div class="container-fluid mb-3">
  <div class="row g-3">

    <div class="col-md-3"><div class="panel text-center">
      <h6>Total Issues</h6><h3 id="totalIssues">0</h3>
    </div></div>

    <div class="col-md-3"><div class="panel text-center">
      <h6>Critical</h6><h3 class="text-danger" id="criticalCount">0</h3>
    </div></div>

    <div class="col-md-3"><div class="panel text-center">
      <h6>Risk Score</h6><h3 id="riskScore">0</h3>
    </div></div>

    <div class="col-md-3"><div class="panel text-center">
      <h6>Status</h6><h6 class="text-success">Secure</h6>
    </div></div>

  </div>
</div>

<div class="container-fluid">
<div class="row g-3">

<!-- LEFT -->
<div class="col-md-3 panel">
    <h6>🔥 Live Timeline</h6>
    <div id="timeline" class="timeline"></div>

    <hr/>

    <h6>🌐 Repo Scan</h6>
    <input id="repoUrl" class="form-control form-control-sm" placeholder="GitHub repo URL"/>
    <button class="btn btn-primary btn-sm w-100 mt-2" onclick="scanRepo()">Scan Repo</button>

    <hr/>

    <h6>🧠 CVE Lookup</h6>
    <input id="cveInput" class="form-control form-control-sm"/>
    <button class="btn btn-warning btn-sm w-100 mt-2" onclick="fetchCVE()">Fetch CVEs</button>

    <div id="cvePanel" class="mt-2 small"></div>

    <h6 class="mt-3">📁 Repo Files</h6>
    <div id="fileTree" class="small"></div>

    <button class="btn btn-outline-light w-100 mt-2" onclick="exportPDF()">Export PDF</button>
</div>

<!-- CENTER -->
<div class="col-md-6 panel">

    <h5>SafeAIScan Engine</h5>

    <!-- PROGRESS -->
    <div id="scanProgressText" class="small mb-1"></div>
    <div class="progress mb-2">
      <div id="scanProgressBar" class="progress-bar"></div>
    </div>

    <textarea id="code" class="form-control mt-3"
                rows="6"
                placeholder='eval("print(\"hello\")")'></textarea>

    <button class="btn btn-success w-100 mt-2" onclick="runScan()">Run Scan</button>

    <hr/>

    <div id="results"></div>

</div>

<!-- RIGHT -->
<div class="col-md-3 panel">
    <h6>📊 System</h6>
    <div class="text-success">● AI Scanner Online</div>

    <h6>📡 Heatmap</h6>
    <div id="heatmap" class="heatmap"></div>

    <h6 class="mt-3">📊 Severity</h6>
    <div class="progress">
      <div id="barCritical" class="progress-bar bg-danger"></div>
      <div id="barHigh" class="progress-bar bg-warning"></div>
      <div id="barLow" class="progress-bar bg-success"></div>
    </div>
    <div class="panel mt-3">
        
        <h6>🧠 AI Explain</h6>
        <div id="aiChat" style="max-height:200px;overflow:auto;"></div>
        
        <input id="aiInput" class="form-control mt-2" placeholder="Ask about this vulnerability..."/>
        <button class="btn btn-sm btn-primary mt-2 w-100" onclick="askAI()">Ask AI</button>
    </div>

    <div class="panel mt-3">
        <h6>👥 Team</h6>
        <ul id="teamList"></ul>
    </div>
</div>

</div>
</div>

<!-- SIDE PANEL -->
<div id="side" class="side">
    <h5 id="title"></h5>
    <div id="desc"></div>
    <button class="btn btn-danger w-100 mt-3" onclick="closeSide()">Close</button>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
let findings = [];
window.aiResult = null;

// =========================
// LOG TIMELINE
// =========================
function log(msg){
    const el = document.getElementById("timeline");
    if(!el) return;
    const d = document.createElement("div");
    d.className="timeline-item";
    d.innerText=msg;
    el.prepend(d);
}

// =========================
// 🚀 PIPELINE PROGRESS
// =========================
function startPipeline(){
    const steps = [
        "Parsing code...",
        "Running static analysis...",
        "Checking vulnerabilities...",
        "AI risk modeling...",
        "Mapping CVEs...",
        "Finalizing report..."
    ];

    const text = document.getElementById("scanProgressText");
    const bar = document.getElementById("scanProgressBar");

    let i = 0;

    clearInterval(scanProgressInterval);

    scanProgressInterval = setInterval(()=>{
        if(i >= steps.length){
            clearInterval(scanProgressInterval);
            return;
        }

        const percent = ((i+1)/steps.length)*100;

        text.innerText = steps[i];
        bar.style.width = percent + "%";

        i++;
    }, 700);
}

function stopProgress(){
    clearInterval(scanProgressInterval);
    document.getElementById("scanProgressBar").style.width = "100%";
    document.getElementById("scanProgressText").innerText = "Scan Complete";
}

// =========================
// 🔥 MAIN SCAN (FIXED)
// =========================
async function runScan(){
    log("Scanning...");
    startPipeline();

    try{
        const data = await analyzeCode(
            document.getElementById("code").value
        );

        console.log("🔥 SCAN RESULT:", data);

        window.aiResult = data.ai || null;

        findings = data.findings || [];

        // ✅ FALLBACK SYSTEM
        if(findings.length === 0){
            if(window.aiResult?.explanation){
                findings = [{
                    title: "AI Detected Issues",
                    description: window.aiResult.explanation,
                    severity: "HIGH",
                    fix: (window.aiResult.fixes || []).join("\n")
                }];
            } else {
                findings = [{
                    title: "No Issues Detected",
                    description: "Scanner found nothing.",
                    severity: "LOW",
                    fix: "N/A"
                }];
            }
        }

        renderOverview(data);
        render();
        renderAI();
        renderHeatmap();

        stopProgress();
        log("Scan complete");

    }catch(e){
        stopProgress();
        log("Error: "+e.message);
    }
}

// =========================
// 📊 OVERVIEW PANEL
// =========================
function renderOverview(data){
    const el = document.getElementById("totalIssues");

    const score = Math.max(0, 100 - findings.length * 10);

    document.getElementById("totalIssues").innerText = findings.length;
    document.getElementById("riskScore").innerText = score;
    document.getElementById("criticalCount").innerText =
        findings.filter(f=>f.severity==="HIGH").length;
}

// =========================
// 🧬 RENDER VULNS
// =========================
function render(){
    const box = document.getElementById("results");
    box.innerHTML="";

    const order = {CRITICAL:4,HIGH:3,MEDIUM:2,LOW:1};

    findings.sort((a,b)=>(order[b.severity]||0)-(order[a.severity]||0));

    findings.forEach(v=>{
        const color =
            v.severity==="HIGH" ? "danger" :
            v.severity==="MEDIUM" ? "warning" :
            "success";

        const div=document.createElement("div");
        div.className="vuln";

        div.innerHTML=`
        <div class="d-flex justify-content-between">
            <div>
                <b>${v.title}</b>
                <div class="text-muted small">${v.description}</div>
            </div>
            <span class="badge bg-${color}">
                ${v.severity}
            </span>
        </div>`;

        div.onclick=()=>openSide(v);
        box.appendChild(div);
    });
}

// =========================
// 🤖 AI PANEL
// =========================
function renderAI(){
    const box = document.getElementById("aiChat");
    if(!box) return;

    if(!window.aiResult){
        box.innerHTML = "No AI response";
        return;
    }

    box.innerHTML = `
        <div><b>AI Analysis:</b></div>
        <div class="small mb-2">
            ${window.aiResult.explanation}
        </div>

        <ul class="small">
            ${(window.aiResult.fixes||[])
                .map(f=>`<li>${f}</li>`).join("")}
        </ul>
    `;
}

// =========================
// 🔥 HEATMAP
// =========================
function renderHeatmap(){
    const map=document.getElementById("heatmap");
    map.innerHTML="";

    findings.forEach(v=>{
        const c=document.createElement("div");
        c.className="heat-cell " + (v.severity?.toLowerCase() || "low");
        map.appendChild(c);
    });
}

// =========================
// SIDE PANEL
// =========================
function openSide(v){
    document.getElementById("side").classList.add("open");

    document.getElementById("title").innerText=v.title;

    document.getElementById("desc").innerHTML=`
        <p>${v.description}</p>
        <pre>${v.fix}</pre>
    `;
}

function closeSide(){
    document.getElementById("side").classList.remove("open");
}

window.runScan = runScan;
</script>

</body>
</html>
