<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SafeAIScan Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body {
    background: #0b0f17;
    color: #e6edf3;
    font-family: Inter, sans-serif;
}

.panel {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 14px;
}

/* TIMELINE */
.timeline {
    max-height: 420px;
    overflow-y: auto;
    font-size: 12px;
}
.timeline-item {
    background: #0b1220;
    border-left: 2px solid #6366f1;
    padding: 6px;
    margin-bottom: 6px;
    border-radius: 6px;
}

/* SEVERITY */
.tab {
    cursor: pointer;
    padding: 6px 10px;
    margin-right: 6px;
    background: #1f2937;
    border-radius: 8px;
    font-size: 12px;
}
.tab.active { background: #6366f1; }

/* VULN */
.vuln {
    background: #0f172a;
    border: 1px solid #1f2937;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
}

/* SIDE PANEL */
.side {
    position: fixed;
    right: -420px;
    top: 0;
    width: 420px;
    height: 100%;
    background: #0b1220;
    border-left: 1px solid #1f2937;
    transition: 0.3s;
    padding: 16px;
    z-index: 9999;
}
.side.open { right: 0; }

/* DIFF */
.diff {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}
.codebox {
    background: #0a0f1c;
    border: 1px solid #1f2937;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
    white-space: pre-wrap;
}

/* HEATMAP */
.heatmap {
    display: grid;
    grid-template-columns: repeat(10,1fr);
    gap: 4px;
}
.heat-cell {
    height: 10px;
    border-radius: 3px;
}
.high { background: #ef4444; }
.medium { background: #f59e0b; }
.low { background: #22c55e; }
.critical { background: #b91c1c; }

</style>
</head>

<body>

<div class="container-fluid">
<div class="row g-3">

<!-- LEFT -->
<div class="col-md-3 panel">
    <h6>🔥 Live Timeline</h6>
    <div id="timeline" class="timeline"></div>

    <hr/>

    <h6>🌐 Repo Scan</h6>
    <input id="repoUrl" class="form-control form-control-sm" placeholder="GitHub repo URL"/>
    <button class="btn btn-primary btn-sm w-100 mt-2" onclick="scanRepo()">Scan Repo</button>

    <hr/>

    <h6>🧠 CVE Lookup</h6>
    <input id="cveInput" class="form-control form-control-sm" placeholder="e.g. log4j"/>
    <button class="btn btn-warning btn-sm w-100 mt-2" onclick="fetchCVE()">Fetch CVEs</button>

    <div id="cvePanel" class="mt-2 small"></div>
</div>

<!-- CENTER -->
<div class="col-md-6 panel">

    <h5>SafeAIScan Engine</h5>

    <textarea id="code" class="form-control" rows="6" placeholder="Paste code..."></textarea>

    <button class="btn btn-success w-100 mt-2" onclick="runScan()">Run Scan</button>

    <hr/>

    <!-- TABS -->
    <div class="mb-2">
        <span class="tab active" onclick="setFilter('ALL', this)">ALL</span>
        <span class="tab" onclick="setFilter('CRITICAL')">CRITICAL</span>
        <span class="tab" onclick="setFilter('HIGH', this)">HIGH</span>
        <span class="tab" onclick="setFilter('MEDIUM', this)">MEDIUM</span>
        <span class="tab" onclick="setFilter('LOW', this)">LOW</span>
    </div>

    <div id="results"></div>

</div>

<!-- RIGHT -->
<div class="col-md-3 panel">
    <h6>📊 System</h6>
    <div class="text-success">● AI Scanner Online</div>

    <hr/>

    <h6>📡 Heatmap</h6>
    <div id="heatmap" class="heatmap"></div>
</div>

</div>
</div>

<div id="severityTabs" class="mt-2"></div>

<div id="fixDiff" class="mt-3"></div>

<!-- SIDE PANEL -->
<div id="side" class="side">
    <h5 id="title"></h5>
    <p id="desc"></p>

    <h6>🔍 Fix Diff</h6>
    <div class="diff">
        <div class="codebox" id="before"></div>
        <div class="codebox" id="after"></div>
    </div>

    <button class="btn btn-danger w-100 mt-3" onclick="closeSide()">Close</button>
</div>

<script src="app.js"></script>

<script>
let findings = [];
let filter = "ALL";
// let ws;

function log(msg) {
    const el = document.getElementById("timeline");
    if (!el) return;

    const div = document.createElement("div");
    div.className = "timeline-item";
    div.innerText = msg;

    el.prepend(div);
}

/* =====================
   SCAN CODE
===================== */
async function runScan() {
    log("Sending code to backend...");

    const code = document.getElementById("code").value;

    const res = await fetch("/api/analyze", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ code })
    });

    const text = await res.text();

    let data;
    try {
        data = JSON.parse(text);
    } catch (e) {
        log("Scan failed: invalid response");
        return;
    }

    findings = data.findings || [];
    render();
    log("Scan complete");
}

/* =====================
   REPO SCAN
===================== */
async function scanRepo() {
    const repo_url = document.getElementById("repoUrl").value;

    log("Scanning repo...");

    const res = await fetch("/api/repo-scan", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ repo_url })
    });

    const text = await res.text();

    let data;
    try {
        data = JSON.parse(text);
    } catch (e) {
        log("Repo scan failed");
        return;
    }

    findings = data.findings || [];
    render();
}

/* =====================
   CVE LOOKUP
===================== */
async function fetchCVE() {
    const q = document.getElementById("cveInput").value;

    const res = await fetch(`/cve?query=${encodeURIComponent(q)}`);
    const data = await res.json();

    document.getElementById("cvePanel").innerHTML =
        (data.cves || [])
        .map(c => `🔴 ${c.id} (${c.severity})`)
        .join("<br/>");
}

/* =====================
   FILTER
===================== */
function setFilter(f, el) {
    filter = f;

    document.querySelectorAll(".tab")
      .forEach(t => t.classList.remove("active"));

    if (el) el.classList.add("active");

    render();
}

/* =====================
   RENDER
===================== */
function render() {
    const box = document.getElementById("results");
    box.innerHTML = "";

    const filtered = findings.filter(f =>
        filter === "ALL" ? true : f.severity === filter
    );

    filtered.forEach(v => {
        const div = document.createElement("div");
        div.className = "vuln";

        div.innerHTML = `
            <b>${v.title}</b><br/>
            <small>${v.severity}</small>
        `;

        div.onclick = () => openSide(v);
        box.appendChild(div);
    });

    renderHeatmap();
}

/* =====================
   SIDE PANEL
===================== */
function openSide(v) {
    document.getElementById("side").classList.add("open");

    document.getElementById("title").innerText = v.title;
    document.getElementById("desc").innerText = v.description;

    document.getElementById("before").innerText = v.before || "";
    document.getElementById("after").innerText = v.after || "";
}

function closeSide() {
    document.getElementById("side").classList.remove("open");
}

/* =====================
   HEATMAP
===================== */
function renderHeatmap() {
    const map = document.getElementById("heatmap");
    map.innerHTML = "";

    findings.forEach(v => {
        const cell = document.createElement("div");
        cell.className = "heat-cell " + (v.severity || "low").toLowerCase();
        map.appendChild(cell);
    });
}
</script>

</body>
</html>
