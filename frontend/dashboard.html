<!DOCTYPE html>
<html>
<head>
    <script>
const token = localStorage.getItem("access_token");

if (!token || token === "undefined") {
  window.location.replace("login.html");
}
</script>

  <title>SafeAIScan Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container-fluid">

  <!-- HEADER -->
  <div class="row p-3 bg-black">
    <h4>SafeAIScan Enterprise Dashboard</h4>
  </div>

  <div class="row mt-3">

    <!-- LEFT PANEL -->
    <div class="col-md-3">

      <div class="card bg-secondary p-3">
        <h5>API Key</h5>
        <code id="apiKey"></code>
        <button class="btn btn-sm btn-light mt-2" onclick="copyKey()">Copy</button>
      </div>

      <div class="card bg-secondary p-3 mt-3">
        <h5>Plan</h5>
        <div id="plan">Loading...</div>

        <button class="btn btn-success mt-2" onclick="upgrade('pro')">
          Upgrade Pro
        </button>

        <button class="btn btn-warning mt-2" onclick="upgrade('enterprise')">
          Enterprise
        </button>
      </div>

    </div>

    <!-- CENTER -->
    <div class="col-md-6">

      <div class="card bg-secondary p-3">
        <h5>AI Code Scanner</h5>

        <textarea id="code" class="form-control" rows="6" placeholder="Paste code here..."></textarea>

        <button class="btn btn-primary mt-2" onclick="scan()">
          Analyze
        </button>

        <pre id="result" class="mt-3 text-light"></pre>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="col-md-3">

      <div class="card bg-secondary p-3">
        <h5>Usage Today</h5>
        <div id="usage">0</div>
      </div>

      <div class="card bg-secondary p-3 mt-3">
        <h5>Risk History</h5>
        <ul id="history"></ul>
        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
      </div>

    </div>

  </div>
</div>

<canvas id="usageChart" height="150"></canvas>

<script src="api.js"></script>
<script src="app.js"></script>

</body>
</html>
