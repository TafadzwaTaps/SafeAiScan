<!DOCTYPE html>
<html>
<head>
  <title>SafeAIScan Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">
  <div class="card bg-secondary p-4">
    <h3 class="text-center">SafeAIScan Login</h3>

    <input id="email" class="form-control mt-3" placeholder="Email">
    <input id="password" type="password" class="form-control mt-2" placeholder="Password">

    <button class="btn btn-primary mt-3 w-100" onclick="login()">
      Login
    </button>
  </div>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://rathious-safeaiscan.hf.space/auth/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      password
    })
  });

  const data = await res.json();

  console.log("LOGIN RESPONSE:", data);

  if (!data.access_token) {
    alert("Login failed");
    return;
  }
  

  localStorage.setItem("access_token", data.access_token);

  // DO NOT overwrite API key
  if (data.api_key) {
    localStorage.setItem("api_key", data.api_key);
  }

  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
