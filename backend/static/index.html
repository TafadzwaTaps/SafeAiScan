<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan AI - Cybersecurity Analysis</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container-fluid vh-100 p-0 d-flex">
        <!-- Sidebar - History -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 class="sidebar-title">
                    <i class="ph ph-clock-counter-clockwise"></i>
                    ANALYSIS HISTORY
                </h3>
                <button class="btn-terminal btn-secondary" id="clear-history-btn" data-testid="clear-history-btn" aria-label="Clear all history">
                    <i class="ph ph-trash"></i>
                </button>
            </div>
            <div class="history-list" id="history-list" data-testid="history-list">
                <!-- History items populated by JS -->
            </div>
        </aside>

        <!-- Mobile Sidebar Toggle -->
        <button class="sidebar-toggle d-lg-none" id="sidebar-toggle" data-testid="sidebar-toggle" aria-label="Toggle history sidebar">
            <i class="ph ph-list"></i>
        </button>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="app-header">
                <div class="logo-section">
                    <div class="logo">
                        <i class="ph ph-shield-check"></i>
                    </div>
                    <div>
                        <h1 class="app-title">SAFESCAN AI</h1>
                        <p class="app-subtitle">CYBERSECURITY ANALYSIS TERMINAL</p>
                    </div>
                </div>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">SYSTEM ONLINE</span>
                </div>
            </header>

            <!-- Input Section -->
            <section class="input-section">
                <div class="section-header">
                    <label for="input-text" class="section-label">
                        <i class="ph ph-terminal-window"></i>
                        INPUT PAYLOAD
                    </label>
                    <div class="example-buttons">
                        <button class="btn-terminal btn-secondary btn-sm" data-testid="example-log-btn" data-example="log">
                            LOG
                        </button>
                        <button class="btn-terminal btn-secondary btn-sm" data-testid="example-code-btn" data-example="code">
                            CODE
                        </button>
                        <button class="btn-terminal btn-secondary btn-sm" data-testid="example-email-btn" data-example="email">
                            EMAIL
                        </button>
                    </div>
                </div>
                <div class="input-wrapper">
                    <textarea 
                        id="input-text" 
                        data-testid="input-text"
                        placeholder="Paste logs, code, or email content here for security analysis..."
                        aria-label="Input text for security analysis"
                        rows="8"
                    ></textarea>
                    <div class="input-footer">
                        <span class="char-count" id="char-count">0 / 50,000</span>
                        <button class="btn-terminal btn-secondary btn-sm" id="clear-input-btn" data-testid="clear-input-btn">
                            <i class="ph ph-x"></i> CLEAR
                        </button>
                    </div>
                </div>
                <button class="btn-terminal btn-primary analyze-btn" id="analyze-btn" data-testid="analyze-btn" aria-label="Analyze input for security issues">
                    <i class="ph ph-magnifying-glass"></i>
                    ANALYZE PAYLOAD
                </button>
            </section>

            <!-- Loading Indicator -->
            <div class="loading-section" id="loading-section" style="display: none;">
                <div class="loading-bar">
                    <div class="loading-progress" id="loading-progress"></div>
                </div>
                <div class="loading-text">
                    <span class="loading-brackets">[</span>
                    <span class="loading-dots" id="loading-dots">||||</span>
                    <span class="loading-brackets">]</span>
                    <span class="loading-message" id="loading-message">SCANNING PAYLOAD...</span>
                </div>
            </div>

            <!-- Results Section -->
            <section class="results-section" id="results-section" style="display: none;">
                <div class="section-header">
                    <label class="section-label">
                        <i class="ph ph-file-text"></i>
                        ANALYSIS RESULTS
                    </label>
                    <button class="btn-terminal btn-secondary btn-sm" id="copy-results-btn" data-testid="copy-results-btn" aria-label="Copy results to clipboard">
                        <i class="ph ph-copy"></i> COPY
                    </button>
                </div>
                
                <!-- Risk Level -->
                <div class="risk-container" id="risk-container">
                    <span class="risk-label">THREAT LEVEL</span>
                    <span class="risk-badge" id="risk-badge" data-testid="risk-badge">--</span>
                </div>

                <!-- Explanation -->
                <div class="explanation-panel">
                    <h4 class="panel-title">
                        <i class="ph ph-info"></i>
                        ANALYSIS
                    </h4>
                    <p class="explanation-text" id="explanation-text" data-testid="explanation-text"></p>
                </div>

                <!-- Fixes -->
                <div class="fixes-panel">
                    <h4 class="panel-title">
                        <i class="ph ph-wrench"></i>
                        RECOMMENDED ACTIONS
                    </h4>
                    <ul class="fixes-list" id="fixes-list" data-testid="fixes-list"></ul>
                </div>

                <!-- Timestamp -->
                <div class="result-meta">
                    <span class="meta-label">ANALYZED AT:</span>
                    <span class="meta-value" id="result-timestamp" data-testid="result-timestamp"></span>
                </div>
            </section>

            <!-- Error Section -->
            <div class="error-section" id="error-section" style="display: none;">
                <div class="error-content">
                    <i class="ph ph-warning-circle"></i>
                    <span class="error-message" id="error-message" data-testid="error-message"></span>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toast-container">
        <div class="toast" id="toast" role="alert" aria-live="assertive" data-testid="toast">
            <i class="ph ph-check-circle toast-icon"></i>
            <span class="toast-message" id="toast-message"></span>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="/static/app.js"></script>
</body>
</html>
