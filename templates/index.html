<!DOCTYPE html>
<html>
<head>
    <title>SafeAIScan Enterprise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
        }

        .risk-low { color: #2ecc71; font-weight: bold; }
        .risk-medium { color: #f1c40f; font-weight: bold; }
        .risk-high { color: #e74c3c; font-weight: bold; }

        textarea {
            background: #0d1117 !important;
            color: white !important;
            border: 1px solid #30363d !important;
        }

        .loader {
            border: 4px solid #30363d;
            border-top: 4px solid #58a6ff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h2 class="mb-4">🛡️ SafeAIScan Enterprise</h2>

    <!-- LOGIN -->
    <div class="card p-3 mb-4">
        <h5>🔐 Authentication</h5>
        <input id="username" class="form-control mt-2" placeholder="Username">
        <input id="password" type="password" class="form-control mt-2" placeholder="Password">
        <button onclick="login()" class="btn btn-primary mt-3">Login</button>
    </div>

    <!-- TABS -->
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <button class="nav-link active" onclick="showTab('text')">📝 Text Scan</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="showTab('file')">📂 File Scan</button>
        </li>
    </ul>

    <!-- TEXT TAB -->
    <div id="textTab" class="card p-3 mt-3">
        <textarea id="input" rows="6" class="form-control"
            placeholder="Paste suspicious code, logs, or text..."></textarea>

        <button onclick="scanText()" class="btn btn-success mt-3">Scan Text</button>
    </div>

    <!-- FILE TAB -->
    <div id="fileTab" class="card p-3 mt-3" style="display:none;">
        <input type="file" id="fileInput" class="form-control">
        <button onclick="scanFile()" class="btn btn-warning mt-3">Scan File</button>
    </div>

    <!-- RESULT -->
    <div class="card p-4 mt-4">
        <h5>📊 Scan Result</h5>

        <div id="loading" style="display:none;">
            <div class="loader"></div>
            <p class="text-center mt-2">Analyzing...</p>
        </div>

        <div id="output" style="display:none;">
            <p><strong>Risk:</strong> <span id="risk"></span></p>
            <p><strong>Explanation:</strong></p>
            <p id="explanation"></p>

            <p><strong>Fixes:</strong></p>
            <ul id="fixes"></ul>
        </div>

    </div>

</div>

<script>
const BASE_URL = "https://rathious-safeaiscan.hf.space";
let TOKEN = "";

// ---------------- TAB SWITCH ----------------
function showTab(tab) {
    document.getElementById("textTab").style.display = tab === "text" ? "block" : "none";
    document.getElementById("fileTab").style.display = tab === "file" ? "block" : "none";
}

// ---------------- LOGIN ----------------
async function login() {
    const formData = new URLSearchParams();
    formData.append("username", document.getElementById("username").value);
    formData.append("password", document.getElementById("password").value);

    const res = await fetch(BASE_URL + "/login", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    TOKEN = data.access_token;

    alert("✅ Logged in!");
}

// ---------------- RENDER RESULT ----------------
function renderResult(data) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("output").style.display = "block";

    console.log("API RESPONSE:", data); // 🔥 debug

    // Handle API errors (auth, etc)
    if (data.detail) {
        document.getElementById("explanation").innerText = data.detail;
        document.getElementById("risk").innerText = "Error";
        document.getElementById("fixes").innerHTML = "";
        return;
    }

    // SAFE DEFAULTS
    const risk = data.risk || "Unknown";
    const explanation = data.explanation || "No explanation provided";
    const fixes = Array.isArray(data.fixes) ? data.fixes : [];

    // Risk display
    const riskEl = document.getElementById("risk");
    riskEl.innerText = risk;

    riskEl.className =
        risk === "High" ? "risk-high" :
        risk === "Medium" ? "risk-medium" :
        "risk-low";

    // Explanation
    document.getElementById("explanation").innerText = explanation;

    // Fixes
    const fixesList = document.getElementById("fixes");
    fixesList.innerHTML = "";

    if (fixes.length === 0) {
        const li = document.createElement("li");
        li.innerText = "No fixes provided";
        fixesList.appendChild(li);
    } else {
        fixes.forEach(fix => {
            const li = document.createElement("li");
            li.innerText = fix;
            fixesList.appendChild(li);
        });
    }
}

// ---------------- TEXT SCAN ----------------
async function scanText() {
    const text = document.getElementById("input").value;

    document.getElementById("output").style.display = "none";
    document.getElementById("loading").style.display = "block";

    try {
        const res = await fetch(BASE_URL + "/api/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + TOKEN
            },
            body: JSON.stringify({ text })
        });

        const data = await res.json();
        renderResult(data);

    } catch (err) {
        alert("❌ Error: " + err);
    }
}

// ---------------- FILE SCAN ----------------
async function scanFile() {
    const file = document.getElementById("fileInput").files[0];

    document.getElementById("output").style.display = "none";
    document.getElementById("loading").style.display = "block";

    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch(BASE_URL + "/api/scan-file", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + TOKEN
            },
            body: formData
        });

        const data = await res.json();
        renderResult(data);

    } catch (err) {
        alert("❌ Error: " + err);
    }
}
</script>

</body>
</html>
